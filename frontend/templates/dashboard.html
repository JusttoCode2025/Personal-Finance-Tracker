<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Budget Tracker</title>

    <style>
     .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #7a4a3b;
        padding: 14px 30px;
        color: white;
    }

    .nav-left {
        display: flex;
        align-items: center;
        gap: 22px;
    }

    .logo {
        font-size: 1.3rem;
        font-weight: 700;
        margin-right: 10px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        padding-bottom: 4px;
        position: relative;
    }

/* Hover underline animation */
    .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 0%;
        height: 2px;
        background: #ffd9b3;
        transition: width 0.25s ease;
    }

    .navbar a:hover::after {
        width: 100%;
    }

/* ACTIVE PAGE */
    .navbar a.active {
        font-weight: 700;
    }

    .navbar a.active::after {
        width: 100%;
    }

    .nav-center {
        display: flex;
        gap: 20px;
        font-weight: 600;
}

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #E8DCC4;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .section {
            background: #F5F1E8;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(62, 39, 35, 0.1);
        }

        h1, h2 {
            color: #3E2723;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .budget-bar-container {
            margin-bottom: 40px;
            background: #F5F1E8;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(62, 39, 35, 0.1);
        }

        .progress-bar-wrapper {
            position: relative;
            height: 50px;
            background: #D7CCC8;
            border-radius: 25px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6D4C41 0%, #5D4037 50%, #4E342E 100%);
            transition: width 0.5s ease;
        }

        canvas {
            margin-top: 20px;
        }
        button {
            height: 20px;
            background: #7a4a3b;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">FinanceTracker</span>
        <a href="/home">Home</a>
        <a href="/budget">Budget</a>
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/travel-goal">Travel Goal</a>
        <a href="/about">About</a>
    </div>

    <div class="nav-right">
        <a href="/login">Sign Out</a>
    </div>
</nav>

<div class="container">

    <h1>DASHBOARD</h1>

    <div class="section">
    <h2>Set Monthly Income</h2>
    <div style="display:flex; gap:15px; align-items:center;">
        <input type="number" id="monthlyIncomeInput" placeholder="Enter income">
        <button id="saveIncomeBtn">Save Income</button>
    </div>
    </div>

    <div class="budget-bar-container">
        <h2>Budget Overview</h2>
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="dashboard-progress"></div>
        </div>
        <p id="dashboard-summary"></p>
    </div>

    <div class="section">
        <h2>Spending by Category</h2>
        <div style="max-width:420px;margin:0 auto;">
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <div class="section">
        <h2>Actual Spending (by Category)</h2>
        <canvas id="barChart"></canvas>
    </div>

    <div class="section">
        <h2>Spending Over Time (Last 12 Months)</h2>
        <canvas id="lineChart"></canvas>
    </div>

</div>

<script>
async function loadDashboard() {
    const response = await fetch("/dashboard_data");
    const data = await response.json();

    const totalSpent = data.total_spent;

   // monthly income
let income = parseFloat(localStorage.getItem("monthly_income")) || 0;

const incomeInput = document.getElementById("monthlyIncomeInput");
const saveIncomeBtn = document.getElementById("saveIncomeBtn");
const progressBar = document.getElementById("dashboard-progress");
const summaryText = document.getElementById("dashboard-summary");

// Pre-fill input if stored
if (income > 0 && incomeInput) {
    incomeInput.value = income;
}

// Save income button
if (saveIncomeBtn) {
    saveIncomeBtn.addEventListener("click", () => {

        const value = parseFloat(incomeInput.value);

        if (!value || value <= 0) {
            alert("Enter a valid income amount.");
            return;
        }

        localStorage.setItem("monthly_income", value);
        updateIncomeBar(value);
    });
}

// Function to update bar
function updateIncomeBar(currentIncome) {

    const remaining = currentIncome - totalSpent;
    const percentUsed = (totalSpent / currentIncome) * 100;

    progressBar.style.width = Math.min(percentUsed, 100) + "%";

    summaryText.textContent =
        `Income: $${currentIncome.toFixed(2)} | Spent: $${totalSpent.toFixed(2)} | Remaining: $${remaining.toFixed(2)} (${percentUsed.toFixed(1)}% used)`;
}


if (income > 0) {
    updateIncomeBar(income);
}

    // Category Chart
    const categoryLabels = data.categories.map(c => c.category);
    const categoryValues = data.categories.map(c => c.total);

    // Pie Chart 
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: categoryLabels,
            datasets: [{
             data: categoryValues,
             backgroundColor: [
                '#6D4C41',
                '#8D6E63',
                '#A1887F',
                '#D7CCC8',
                '#5D4037',
                '#4E342E'
            ],
             borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
            }
        }
    }
});
// bar chart
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: categoryLabels,
            datasets: [{
                label: 'Actual Spending',
                data: categoryValues,
                backgroundColor: '#6D4C41'
            }]
        },
        options: {
            scales: { y: { beginAtZero: true } }
        }
    });

    //Line Chart 
    const monthlyLabels = data.monthly.map(m => m.month);
    const monthlyValues = data.monthly.map(m => m.total);

    new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: 'Total Spent',
                data: monthlyValues,
                borderColor: '#6D4C41',
                fill: false
            }]
        }
    });
}

loadDashboard();

</script>

</body>
</html>
