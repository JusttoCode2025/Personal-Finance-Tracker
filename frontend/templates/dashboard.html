<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<style>
:root {
  --font-sans:'Inter',sans-serif;
  --font-heading:'Geist',sans-serif;
  --radius:30px;
  --shadow-sm:0px 4px 6px rgba(0,0,0,0.08);
  --background:hsl(20,31%,52%);
  --foreground:hsl(0,0%,10%);
  --card:hsl(0,0%,100%);
  --primary:hsl(0,0%,13%);
  --primary-foreground:hsl(0,0%,100%);
  --border:hsl(0,0%,90%);
  --muted:hsl(0,0%,95%);
  --muted-foreground:hsl(0,0%,40%);
  --link-color:hsl(0,0%,13%);
  --link-hover:hsl(0,0%,0%);
  --alert-success:hsl(120, 50%, 40%);
  --alert-error:hsl(0, 70%, 50%);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans);}
body{background:var(--background);color:var(--foreground);min-height:100vh;transition:background 0.3s;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;}

.navbar{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:15px 30px;border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:20px;}
.nav-left{display:flex;align-items:center;gap:20px;font-weight:600;}
.nav-left .logo{font-family:var(--font-heading);font-size:1.4em;transition:transform 0.3s;}
.nav-left .logo:hover{transform:scale(1.1);}
.nav-left a.active,.nav-left a:hover{color:var(--link-color);transform:scale(1.05);}
.nav-right{display:flex;align-items:center;gap:15px;}

.container{max-width:1000px;margin:0 auto;padding:0 15px;}
.section{background:var(--card);padding:25px;border-radius:var(--radius);box-shadow: var(--shadow-sm);margin-bottom:20px;transition:transform 0.3s;}
.section:hover{transform:translateY(-3px);}

h1,h2{font-family:var(--font-heading);}
h1{font-size:2em;margin-bottom:10px;text-align:center;}
h2{font-size:1.2em;margin-bottom:10px;}

.flex-row{display:flex;gap:20px;flex-wrap:wrap;}
.flex-item{flex:1;min-width:280px;}

/* progress bar */
.progress-bar-wrapper{
  width:100%;
  height:22px;
  background:var(--muted);
  border-radius:999px;
  overflow:hidden;
}

.progress-bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1f1f1f,#3a3a3a);
  border-radius:999px;
  transition:width 0.5s ease;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-left">
    <span class="logo">Haven</span>
    <a href="/home">Home</a>
    <a href="/budget">Budget</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/travel-goal">Travel Goal</a>
    <a href="/about">About</a>
  </div>
  <div class="nav-right">
    <i class="fas fa-user-alt" id="profileIcon"></i>
    <span id="profileName"></span>
    <a href="/login">Sign Out</a>
  </div>
</nav>

<div class="container">

  <h1>DASHBOARD</h1>

  <!-- Income  -->
   <div class="section">
    <h2>Set Monthly Income</h2>
    <div style="display:flex; gap:15px; align-items:center;">
        <input type="number" id="monthlyIncomeInput" placeholder="Enter income">
        <button id="saveIncomeBtn">Save Income</button>
    </div>
    </div>
  <div class="section">
    <h2>Budget Usage</h2>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" id="dashboard-progress"></div>
    </div>
    <p id="dashboard-summary"></p>
  </div>
  <div class="budget-bar-container">
        <h2>Budget Overview</h2>
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="dashboard-progress"></div>
        </div>
        <p id="dashboard-summary"></p>
    </div>

  <!-- Charts -->
  <div class="flex-row">

    <div class="section flex-item">
      <h2>Spending by Category</h2>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="section flex-item">
      <h2>Actual Spending</h2>
      <canvas id="barChart"></canvas>
    </div>

  </div>

  <div class="section">
    <h2>Spending Over Time</h2>
    <canvas id="lineChart"></canvas>
  </div>

</div>

<script>
  async function loadDashboard() {
    const response = await fetch("/dashboard_data");
    const data = await response.json();

    const totalSpent = data.total_spent;
    
let income = parseFloat(localStorage.getItem("monthly_income")) || 0;

const incomeInput = document.getElementById("monthlyIncomeInput");
const saveIncomeBtn = document.getElementById("saveIncomeBtn");
const progressBar = document.getElementById("dashboard-progress");
const summaryText = document.getElementById("dashboard-summary");

// Pre-fill input if stored
if (income > 0 && incomeInput) {
    incomeInput.value = income;
}

// Save income button
if (saveIncomeBtn) {
    saveIncomeBtn.addEventListener("click", () => {

        const value = parseFloat(incomeInput.value);

        if (!value || value <= 0) {
            alert("Enter a valid income amount.");
            return;
        }

        localStorage.setItem("monthly_income", value);
        updateIncomeBar(value);
    });
}

    // Category Chart
    const categoryLabels = data.categories.map(c => c.category);
    const categoryValues = data.categories.map(c => c.total);

    // Pie Chart 
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: categoryLabels,
            datasets: [{
             data: categoryValues,
            backgroundColor:['#1f1f1f','#3a3a3a','#5c5c5c','#8c8c8c','#bdbdbd'],
             borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
            }
        }
    }
});
// bar chart
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: categoryLabels,
            datasets: [{
                label: 'Actual Spending',
                data: categoryValues,
                 backgroundColor:'#2c2c2c'.
            }]
        },
        options: {
            scales: { y: { beginAtZero: true } }
        }
    });

    //Line Chart 
    const monthlyLabels = data.monthly.map(m => m.month);
    const monthlyValues = data.monthly.map(m => m.total);

    new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: 'Total Spent',
                data: monthlyValues,
                borderColor:'#1f1f1f',
                fill: false
            }]
        }
    });
}

loadDashboard();
const storedUser = JSON.parse(localStorage.getItem('loggedInUser')) || JSON.parse(sessionStorage.getItem('loggedInUser'));
if(!storedUser) window.location.href='/login';
else document.getElementById('profileName').textContent = storedUser.name;

document.getElementById('signOut').onclick=()=>{
  localStorage.removeItem('loggedInUser');
  sessionStorage.removeItem('loggedInUser');
  window.location.href='/login';
};
  
</script>

</body>

</html>
