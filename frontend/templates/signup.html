<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Haven</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@500;600&display=swap" rel="stylesheet">

<style>
:root {
  --font-sans: 'Inter', sans-serif;
  --font-heading: 'Geist', sans-serif;
  --radius: 30px;
  --shadow-sm: 0px 10px 25px rgba(0,0,0,0.12);
  --background: hsl(20, 31%, 52%);
  --card: hsl(0, 0%, 100%);
  --primary: hsl(0, 0%, 13%);
  --primary-foreground: hsl(0, 0%, 100%);
  --muted: hsl(0, 0%, 95%);
  --border: hsl(0, 0%, 90%);
  --success: #4CAF50;
  --error: hsl(0, 70%, 50%);
  --gray: #888;
}

* { box-sizing:border-box; margin:0; padding:0; font-family:var(--font-sans); }

body {
  background: var(--background);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.signup-box {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  width:100%;
  max-width:420px;
  padding:35px 30px;
  text-align:center;
  animation: fadeInUp 0.6s ease;
}

.logo {
  font-family: var(--font-heading);
  font-size:2.2em;
  font-weight:600;
  margin-bottom:5px;
}

.subtitle { font-size:0.95em; color:#555; margin-bottom:25px; }

.input-field {
  width:100%;
  padding:14px;
  border-radius: var(--radius);
  border:1px solid var(--border);
  font-size:1em;
  margin-bottom:10px;
  transition: all 0.25s ease;
}

.input-field:focus {
  outline:none;
  border-color:black;
  background:var(--muted);
  transform: scale(1.01);
}

.submit-btn {
  width:100%;
  padding:14px;
  border-radius:var(--radius);
  border:none;
  background:var(--primary);
  color:var(--primary-foreground);
  font-size:1.05em;
  font-weight:600;
  cursor:pointer;
  transition: all 0.25s ease;
  margin-top:10px;
}

.submit-btn:hover { transform: translateY(-2px) scale(1.02); }
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

.password-rules {
  text-align:left;
  font-size:0.8em;
  margin-bottom:15px;
  padding-left:20px;
}

.rule {
  list-style: disc;
  color: var(--gray);
  font-style: italic;
  margin-bottom:4px;
  opacity:0.6;
  transform: translateX(-10px);
  transition: all 0.3s ease;
}

.rule.valid {
  color: var(--success);
  font-style: normal;
  opacity:1;
  transform: translateX(0);
}

.fs-success-msg {
  display:none;
  color: var(--success);
  font-weight:600;
  margin-bottom:15px;
  padding:12px 16px;
  background:hsl(120, 50%, 95%);
  border-radius:12px;
  border:1px solid hsl(120, 50%, 80%);
  font-size:0.95em;
}

.fs-error-msg {
  display:none;
  color: var(--error);
  font-weight:600;
  margin-bottom:15px;
  padding:12px 16px;
  background:hsl(0, 70%, 97%);
  border-radius:12px;
  border:1px solid hsl(0, 70%, 85%);
  font-size:0.95em;
}

[data-fs-error] {
  display:block;
  color: var(--error);
  font-size:0.82em;
  text-align:left;
  margin-top:-6px;
  margin-bottom:8px;
  padding-left:4px;
  min-height:1em;
}

.login-link { margin-top:18px; font-size:0.9em; }
.login-link a { text-decoration:none; font-weight:500; }
.login-link a:hover { text-decoration:underline; }

@keyframes fadeInUp { from { opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>

<body>

<div class="signup-box">
  <div class="logo">Haven</div>
  <div class="subtitle">Create your account</div>

  <div class="fs-success-msg" data-fs-success>
    ✅ Account created! Redirecting to login...
  </div>
  <div class="fs-error-msg" data-fs-error>
    ⚠️ Something went wrong, please try again.
  </div>

  <form id="signupForm">
    <input type="text" name="name" class="input-field" placeholder="Full Name" required data-fs-field>
    <span data-fs-error="name"></span>

    <input type="email" name="email" class="input-field" placeholder="Email" required data-fs-field>
    <span data-fs-error="email"></span>

    <input type="password" name="password" class="input-field" placeholder="Password" required data-fs-field>
    <span data-fs-error="password"></span>

    <ul class="password-rules">
      <li class="rule" id="ruleLength">At least 8 characters</li>
      <li class="rule" id="ruleUpper">At least 1 uppercase letter</li>
      <li class="rule" id="ruleLower">At least 1 lowercase letter</li>
      <li class="rule" id="ruleNumber">At least 1 number</li>
      <li class="rule" id="ruleSpecial">At least 1 special character</li>
    </ul>

    <button type="submit" class="submit-btn" data-fs-submit-btn>Create Account</button>
  </form>

  <div class="login-link">
    Already have an account? <a href="/login">Sign In</a>
  </div>
</div>

<script>
  const form = document.getElementById('signupForm');
  const passwordField = form.password;


  const rules = {
    ruleLength: /.{8,}/,
    ruleUpper: /[A-Z]/,
    ruleLower: /[a-z]/,
    ruleNumber: /\d/,
    ruleSpecial: /[\W_]/
  };

  passwordField.addEventListener('input', () => {
    const pass = passwordField.value;
    for (let id in rules) {
      const el = document.getElementById(id);
      rules[id].test(pass) ? el.classList.add('valid') : el.classList.remove('valid');
    }
  });

  // Block submission if password rules aren't met
  form.addEventListener('submit', function(e) {
    const pass = passwordField.value;
    for (let id in rules) {
      if (!rules[id].test(pass)) {
        e.stopImmediatePropagation(); 
        document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        return;
      }
    }
  }, true); 

 
  const successEl = document.querySelector('[data-fs-success]');
  const observer = new MutationObserver(() => {
    if (successEl.style.display !== 'none' && successEl.style.display !== '') {
      setTimeout(() => window.location.href = '/login', 2000);
    }
  });
  observer.observe(successEl, { attributes: true, attributeFilter: ['style'] });

  // Formspree Ajax init
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#signupForm', formId: 'mqeglrwg' });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
