<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Budget Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #E8DCC4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #F5F1E8;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(62, 39, 35, 0.2);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #6D4C41 0%, #5D4037 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 0.95em;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #3E2723;
            font-weight: 500;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #D7CCC8;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            transition: all 0.3s;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #6D4C41;
            box-shadow: 0 0 0 3px rgba(109, 76, 65, 0.1);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #6D4C41 0%, #5D4037 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            font-weight: 500;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #5D4037 0%, #4E342E 100%);
            box-shadow: 0 5px 15px rgba(93, 64, 55, 0.3);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #FFF3E0;
            border: 2px solid #FF9800;
            color: #E65100;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #D7CCC8;
        }

        .divider span {
            background: #F5F1E8;
            padding: 0 15px;
            color: #6D4C41;
            position: relative;
            font-size: 0.9em;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
        }

        .signup-link a {
            color: #6D4C41;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #5D4037;
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .login-header h1 {
                font-size: 1.6em;
            }

            .login-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>BUDGET TRACKER</h1>
            <p>Sign in to manage your finances</p>
        </div>

        <div class="login-form">
            <div class="error-message" id="error-message">
                ⚠️ Invalid username or password. Please try again.
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">SIGN IN</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Check if credentials match
            if (username === 'Jane' && password === 'Doe') {
                // Successful login - redirect to budget tracker
                window.location.href = 'budget-tracker-masculine.html';
            } else {
                // Show error message
                errorMessage.classList.add('show');
                
                // Remove error message after 3 seconds
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);

                // Clear password field
                document.getElementById('password').value = '';
            }
        }

        // Remove error message when user starts typing
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('error-message').classList.remove('show');
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('error-message').classList.remove('show');
        });
    </script>
</body>
</html>
