<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven - Travel Goal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

<style>
:root {
  --font-sans:'Inter',sans-serif;
  --font-heading:'Geist',sans-serif;
  --radius:30px;
  --shadow-sm:0px 4px 6px rgba(0,0,0,0.08);
  --background:hsl(20,31%,52%);
  --foreground:hsl(0,0%,10%);
  --card:hsl(0,0%,100%);
  --primary:hsl(0,0%,13%);
  --primary-foreground:hsl(0,0%,100%);
  --border:hsl(0,0%,90%);
  --muted:hsl(0,0%,95%);
  --muted-foreground:hsl(0,0%,40%);
  --link-color:hsl(0,0%,13%);
  --link-hover:hsl(0,0%,0%);
}

* { box-sizing:border-box; margin:0; padding:0; font-family:var(--font-sans); }
body { background:var(--background); color:var(--foreground); min-height:100vh; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; }

.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  padding:15px 30px;
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  margin-bottom:20px;
}

.nav-left { display:flex; align-items:center; gap:20px; font-weight:600; }
.nav-left .logo { font-family:var(--font-heading); font-size:1.4em; transition:0.3s; }
.nav-left .logo:hover { transform:scale(1.1); }
.nav-left a.active, .nav-left a:hover { transform:scale(1.05); }

.nav-right { display:flex; align-items:center; gap:10px; }
.nav-right i, .nav-right a { transition:0.3s; }
.nav-right i:hover, .nav-right a:hover { transform:scale(1.05); }

.container { max-width:1000px; margin:0 auto; padding:0 15px; }

.section {
  background:var(--card);
  padding:25px;
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  margin-bottom:20px;
  transition:0.3s;
}
.section:hover { transform:translateY(-3px); }

h1,h2 { font-family:var(--font-heading); }

h1 {
  font-size:2.2em;
  font-weight:600;
  margin-bottom:8px;
}

h2 {
  font-size:1.2em;
  margin-bottom:10px;
  font-weight:500;
}

.description {
  color:var(--muted-foreground);
  margin-bottom:15px;
}

input, button {
  width:100%;
  padding:12px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  margin-bottom:10px;
}

button {
  background:var(--primary);
  color:var(--primary-foreground);
  border:none;
}
button:hover { transform:scale(1.05); }

.goal-bar-wrapper {
  width:100%;
  height:22px;
  background:var(--muted);
  border-radius:var(--radius);
  overflow:hidden;
  margin:12px 0;
}

.goal-bar-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1f1f1f,#3a3a3a);
  border-radius:var(--radius);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:11px;
  font-weight:500;
  transition:width 0.5s ease;
}

.history-item {
  padding:10px;
  border-radius:var(--radius);
  background:var(--muted);
  margin-bottom:5px;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-left">
    <span class="logo">Haven</span>
    <a href="/home">Home</a>
    <a href="/budget">Budget</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/travel-goal" class="active">Travel Goal</a>
    <a href="/about">About</a>
  </div>

  <div class="nav-right">
    <i class="fas fa-user-alt" id="profileIcon"></i>
    <span id="profileName"></span>
    <a href="/login" id="signOut">Sign Out</a>
  </div>
</nav>

<div class="container">

  <div class="section">
    <h1>Travel Goal</h1>
    <p class="description">Track your travel savings and reach your dream destination faster.</p>
  </div>

  <div class="section">
    <h2>Status</h2>

    <p>Saved: <span id="goalSaved">0</span></p>

    <div class="goal-bar-wrapper">
      <div id="travelProgress" class="goal-bar-fill">
        <span id="travelPercent">0%</span>
      </div>
    </div>

    <p id="goalRemainingText">$0 left</p>
    <div id="goalCelebrate"></div>
  </div>

  <div class="section">
    <h2>Set Goal</h2>
    <input type="number" id="goalAmount" placeholder="Enter goal">
    <button id="setGoalBtn">Set Goal</button>
    <div id="goalMessage"></div>
  </div>

  <div class="section">
    <h2>Add Contribution</h2>
    <input type="number" id="contributionAmount" placeholder="Enter amount">
    <button id="addBtn">Add</button>
    <div id="contributionMessage"></div>

    <button id="resetGoal">Reset Goal</button>
  </div>

</div>

<script>
const storedUser = JSON.parse(localStorage.getItem('loggedInUser')) || JSON.parse(sessionStorage.getItem('loggedInUser'));
if(!storedUser) window.location.href='/login';
else document.getElementById('profileName').textContent = storedUser.name;

document.getElementById('signOut').onclick=()=>{
  localStorage.removeItem('loggedInUser');
  sessionStorage.removeItem('loggedInUser');
  window.location.href='/login';
};
</script>

</body>
</html>
