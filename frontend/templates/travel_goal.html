<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Goal – FinanceTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>

<nav class="navbar">  
    <div class="nav-left">
        <span class="logo">BudgetTracker</span>
        <a href="/home">Home</a>
        <a href="/budget">Budget</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/travel-goal" class="active">Travel Goal</a>
        <a href="/about">About</a>
    </div>
    <div>
        <a href="/login">Sign Out</a>
    </div>
</nav>

<div class="container">

    <div class="section">
        <h1>✈ Travel Savings Goal</h1>
        <p style="margin-top: 8px; color: #555;">
            Plan your next trip and track your savings progress in real time. 
            Set a goal, add contributions, and watch your journey come to life.
        </p>
    </div>

   
    <div class="goal-status-card">

        <div class="goal-header">
            <h2> Your Progress</h2>

            <div class="goal-numbers">
                <div>
                    <span>Saved</span>
                    <strong id="goalSaved">$0</strong>
                </div>
                <div>
                    <span>Remaining</span>
                    <strong id="goalLeft">$0</strong>
                </div>
            </div>
        </div>

        <div class="goal-bar-wrapper">
            <div class="goal-bar-fill" id="travelProgress">
                <span class="goal-percent" id="travelPercent">0%</span>
            </div>
            <span class="goal-remaining-text" id="goalRemainingText">$0 left</span>
        </div>

    </div>

    <div class="section travel-card">

        <h2 style="margin-bottom: 15px;"> Manage Your Goal</h2>

        <div class="input-group">
            <label>Goal Amount ($)</label>
            <input type="number" id="goalAmount" placeholder="Ex: 1500">
             <p id="goalMessage"></p>
        </div>

        <div class="input-group">
            <label>Add Contribution ($)</label>
            <input type="number" id="contributionAmount" placeholder="Ex: 100">
            <p id="contributionMessage"></p>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            
            <button id="setGoalBtn"> Set Goal</button>

            <button id="addBtn"> Add Contribution</button>

            <button id="resetGoal" style="background-color: #ccc; color: #333;">
                Reset
            </button>

        </div>


        <div class="summary" id="goalSummary" style="margin-top: 15px;"></div>
        <div class="celebrate" id="goalCelebrate"></div>

    </div>

</div>

</body>
</html>
