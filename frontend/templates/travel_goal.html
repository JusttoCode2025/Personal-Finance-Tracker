<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven - Travel Goal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

<style>
:root {
  --font-sans:'Inter',sans-serif;
  --font-heading:'Geist',sans-serif;
  --radius:30px;
  --shadow-sm:0px 4px 6px rgba(0,0,0,0.08);
  --background:hsl(20,31%,52%);
  --foreground:hsl(0,0%,10%);
  --card:hsl(0,0%,100%);
  --primary:hsl(0,0%,13%);
  --primary-foreground:hsl(0,0%,100%);
  --border:hsl(0,0%,90%);
  --muted:hsl(0,0%,95%);
  --muted-foreground:hsl(0,0%,40%);
  --link-color:hsl(0,0%,13%);
  --link-hover:hsl(0,0%,0%);
  --success: hsl(120, 45%, 38%);
  --danger: hsl(0, 65%, 48%);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans);}
body{background:var(--background);color:var(--foreground);min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;}

.navbar{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);padding:15px 30px;border-radius:var(--radius);
  box-shadow:var(--shadow-sm);margin-bottom:20px;
}
.nav-left{display:flex;align-items:center;gap:20px;font-weight:600;}
.nav-left .logo{font-family:var(--font-heading);font-size:1.4em;transition:0.3s;}
.nav-left .logo:hover{transform:scale(1.1);}
.nav-left a.active,.nav-left a:hover{color:var(--link-color);transform:scale(1.05);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-right i,.nav-right a{transition:0.3s;}
.nav-right i:hover,.nav-right a:hover{transform:scale(1.05);}

.container{max-width:1000px;margin:0 auto;padding:0 15px;}

.section{
  background:var(--card);padding:25px;border-radius:var(--radius);
  box-shadow:var(--shadow-sm);margin-bottom:20px;transition:0.3s;
}
.section:hover{transform:translateY(-3px);}

h1,h2{font-family:var(--font-heading);}
h1{font-size:2.2em;font-weight:600;margin-bottom:8px;}
h2{font-size:1.1em;font-weight:600;margin-bottom:14px;}

.description{color:var(--muted-foreground);margin-bottom:15px;}

.stat-cards{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-bottom:18px;
}
.stat-card{background:var(--muted);border-radius:14px;padding:14px 16px;}
.stat-label{font-size:0.72em;color:var(--muted-foreground);margin-bottom:4px;}
.stat-value{font-size:1.25em;font-weight:600;color:var(--foreground);}
.stat-value.positive{color:var(--success);}

/* Target date insight row */
.date-insight-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}
.date-insight-card {
  background:var(--muted);
  border-radius:14px;
  padding:14px 16px;
}
.date-insight-label {
  font-size:0.72em;
  color:var(--muted-foreground);
  margin-bottom:4px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.date-insight-value {
  font-size:1.1em;
  font-weight:600;
  color:var(--foreground);
}

.progress-bar-wrapper{
  width:100%;height:10px;background:var(--muted);
  border-radius:999px;overflow:hidden;margin-bottom:8px;
}
.progress-bar-fill{
  height:100%;width:0%;background:var(--primary);
  border-radius:999px;transition:width 0.5s ease;
}
.progress-hint{font-size:0.8em;color:var(--muted-foreground);}
.celebrate{font-size:1em;font-weight:600;color:var(--success);margin-top:8px;min-height:1.4em;}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.action-row{grid-template-columns:1fr;}}

.input-row{display:flex;gap:8px;align-items:center;}
.pill-input{
  flex:1;padding:11px 16px;border-radius:999px;
  border:1px solid var(--border);font-size:0.92em;
  background:var(--muted);color:var(--foreground);
  transition:border-color 0.2s,background 0.2s;
}
.pill-input:focus{outline:none;border-color:var(--primary);background:#fff;}

.date-input {
  flex:1;padding:11px 16px;border-radius:999px;
  border:1px solid var(--border);font-size:0.92em;
  background:var(--muted);color:var(--foreground);
  transition:border-color 0.2s,background 0.2s;
  width:100%;
}
.date-input:focus{outline:none;border-color:var(--primary);background:#fff;}

.pill-btn{
  padding:11px 20px;border-radius:999px;border:none;
  background:var(--primary);color:var(--primary-foreground);
  font-size:0.92em;font-weight:600;white-space:nowrap;
  transition:transform 0.2s;
}
.pill-btn:hover{transform:scale(1.04);}

.ghost-btn{
  width:100%;margin-top:10px;padding:10px 16px;
  border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--muted-foreground);
  font-size:0.85em;transition:background 0.2s,color 0.2s;
}
.ghost-btn:hover{background:var(--muted);color:var(--foreground);}

.inline-msg{font-size:0.82em;margin-top:8px;min-height:1em;}
.inline-msg.success{color:var(--success);}
.inline-msg.error{color:var(--danger);}

.note-textarea {
  width:100%;
  padding:12px 16px;
  border-radius:16px;
  border:1px solid var(--border);
  font-size:0.92em;
  background:var(--muted);
  color:var(--foreground);
  resize:vertical;
  min-height:100px;
  margin-bottom:10px;
  transition:border-color 0.2s, background 0.2s;
  font-family:var(--font-sans);
}
.note-textarea:focus{outline:none;border-color:var(--primary);background:#fff;}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-left">
    <span class="logo">Haven</span>
    <a href="/home">Home</a>
    <a href="/budget">Budget</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/travel-goal" class="active">Travel Goal</a>
    <a href="/about">About</a>
  </div>
  <div class="nav-right">
    <i class="fas fa-user-alt" id="profileIcon"></i>
    <span id="profileName"></span>
    <a href="/login" id="signOut">Sign Out</a>
  </div>
</nav>

<div class="container">

  <div class="section">
    <h1>Travel Goal</h1>
    <p class="description">Track your travel savings and reach your dream destination faster.</p>
  </div>

  <!-- Status -->
  <div class="section">
    <h2>Status</h2>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-label">Goal</div>
        <div class="stat-value" id="goalTarget">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Saved</div>
        <div class="stat-value" id="goalSaved">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Remaining</div>
        <div class="stat-value" id="goalRemainingText">—</div>
      </div>
    </div>

    <!-- Days left and  daily target -->
    <div class="date-insight-row" id="dateInsightRow" style="display:none;">
      <div class="date-insight-card">
        <div class="date-insight-label">Days Left</div>
        <div class="date-insight-value" id="daysLeft">—</div>
      </div>
      <div class="date-insight-card">
        <div class="date-insight-label">Daily Savings Target</div>
        <div class="date-insight-value" id="dailySavingsTarget">—</div>
      </div>
    </div>

    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" id="travelProgress"></div>
    </div>
    <p class="progress-hint" id="travelPercent">Set a goal below to get started.</p>
    <p class="celebrate" id="goalCelebrate"></p>
  </div>


  <div class="action-row">

    <div class="section">
      <h2>Set Goal</h2>
      <div class="input-row">
        <input class="pill-input" type="number" id="goalAmount" placeholder="Enter goal amount">
        <button class="pill-btn" id="setGoalBtn">Set</button>
      </div>
      <div id="goalMessage" class="inline-msg"></div>
    </div>

    <div class="section">
      <h2>Add Contribution</h2>
      <div class="input-row">
        <input class="pill-input" type="number" id="contributionAmount" placeholder="Enter amount">
        <button class="pill-btn" id="addBtn">Add</button>
      </div>
      <div id="contributionMessage" class="inline-msg"></div>
      <button class="ghost-btn" id="resetGoal">Reset Goal</button>
    </div>

  </div>

  <!-- Target Date -->
  <div class="section">
    <h2>Target Date</h2>
    <div class="input-row">
      <input class="date-input" type="date" id="targetDate">
      <button class="pill-btn" id="saveDateBtn">Save</button>
    </div>
    <div id="dateMessage" class="inline-msg"></div>
  </div>

  <!-- Notes -->
  <div class="section">
    <h2>Notes</h2>
    <textarea class="note-textarea" id="goalNote" placeholder="Add a note about your trip — destination ideas, things to save for, reminders..."></textarea>
    <div class="input-row" style="justify-content:flex-end;">
      <button class="pill-btn" id="saveNoteBtn">Save Note</button>
    </div>
    <div id="noteMessage" class="inline-msg"></div>
  </div>

</div>

<script>
const storedUser = JSON.parse(localStorage.getItem('loggedInUser')) || JSON.parse(sessionStorage.getItem('loggedInUser'));
if (!storedUser) window.location.href = '/login';
else document.getElementById('profileName').textContent = storedUser.name;

document.getElementById('signOut').onclick = () => {
  localStorage.removeItem('loggedInUser');
  sessionStorage.removeItem('loggedInUser');
  window.location.href = '/login';
};
</script>

</body>
</html>
