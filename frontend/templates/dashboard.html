<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<style>
:root {
  --font-sans:'Inter',sans-serif;
  --font-heading:'Geist',sans-serif;
  --radius:30px;
  --shadow-sm:0px 4px 6px rgba(0,0,0,0.08);
  --background:hsl(20,31%,52%);
  --foreground:hsl(0,0%,10%);
  --card:hsl(0,0%,100%);
  --primary:hsl(0,0%,13%);
  --primary-foreground:hsl(0,0%,100%);
  --border:hsl(0,0%,90%);
  --muted:hsl(0,0%,95%);
  --muted-foreground:hsl(0,0%,40%);
  --link-color:hsl(0,0%,13%);
  --link-hover:hsl(0,0%,0%);
  --alert-success:hsl(120, 50%, 40%);
  --alert-error:hsl(0, 70%, 50%);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans);}
body{background:var(--background);color:var(--foreground);min-height:100vh;transition:background 0.3s;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;}
.navbar{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:15px 30px;border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:20px;}
.nav-left{display:flex;align-items:center;gap:20px;font-weight:600;}
.nav-left .logo{font-family:var(--font-heading);font-size:1.4em;transition:transform 0.3s;}
.nav-left .logo:hover{transform:scale(1.1);}
.nav-left a.active,.nav-left a:hover{color:var(--link-color);transform:scale(1.05);}
.nav-right{display:flex;align-items:center;gap:15px;}
.nav-right #profileIcon,.nav-right #signOut{transition:transform 0.3s;}
.nav-right #profileIcon:hover,.nav-right #signOut:hover{transform:scale(1.05);}
.container{max-width:1000px;margin:0 auto;padding:0 15px;}
.section{background:var(--card);padding:25px;border-radius:var(--radius);box-shadow: var(--shadow-sm);margin-bottom:20px;transition:transform 0.3s;}
.section:hover{transform:translateY(-3px);}
h1,h2{font-family:var(--font-heading);color:var(--foreground);}
h1{font-size:2em;margin-bottom:5px;}
h2{font-size:1.2em;margin-bottom:10px;}
.description{font-size:1em;color:var(--muted-foreground);margin-bottom:15px;}
.flex-row{display:flex;gap:20px;flex-wrap:wrap;}
.flex-item{flex:1;min-width:280px;}
canvas{max-width:100%;border-radius:var(--radius);background:var(--muted);padding:15px;}
.alert{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius);font-weight:600;color:white;opacity:0;transform:translateY(-20px);transition:0.4s;z-index:1000;}
.alert.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-left">
    <span class="logo">Haven</span>
    <a href="/home">Home</a>
    <a href="/budget">Budget</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/travel-goal">Travel Goal</a>
    <a href="/about">About</a>
  </div>
  <div class="nav-right">
    <i class="fas fa-user-alt" id="profileIcon"></i>
    <span id="profileName"></span>
    <a href="/login" id="signOut">Sign Out</a>
  </div>
</nav>
<div class="container">
  <div class="section">
    <h1>Dashboard</h1>
    <p class="description">Visual analysis of your spending habits. Track budgets, spending per category, and monthly trends.</p>
  </div>
  <div class="flex-row">
    <section class="section flex-item">
      <h2>Budget Spent per Category</h2>
      <canvas id="pieChart"></canvas>
    </section>
    <section class="section flex-item">
      <h2>Budgeted vs Spent</h2>
      <canvas id="barChart"></canvas>
    </section>
  </div>
  <div class="flex-row">
    <section class="section flex-item">
      <h2>Monthly Spending Trends</h2>
      <canvas id="monthlyTrendChart"></canvas>
    </section>
    <section class="section flex-item">
      <h2>Category Comparison</h2>
      <canvas id="categoryComparisonChart"></canvas>
    </section>
  </div>
</div>
<div id="alert" class="alert"></div>
<script>
const storedUser=JSON.parse(localStorage.getItem('loggedInUser'))||JSON.parse(sessionStorage.getItem('loggedInUser'));
if(!storedUser)window.location.href='login.html';
else document.getElementById('profileName').textContent=storedUser.name;
document.getElementById('signOut').addEventListener('click',()=>{
localStorage.removeItem('loggedInUser');
sessionStorage.removeItem('loggedInUser');
window.location.href='/login';
});
async function loadDashboard() {
    const response = await fetch("/dashboard_data");
    const data = await response.json();

    const totalSpent = data.total_spent;

   // monthly income
let income = parseFloat(localStorage.getItem("monthly_income")) || 0;

const incomeInput = document.getElementById("monthlyIncomeInput");
const saveIncomeBtn = document.getElementById("saveIncomeBtn");
const progressBar = document.getElementById("dashboard-progress");
const summaryText = document.getElementById("dashboard-summary");

// Pre-fill input if stored
if (income > 0 && incomeInput) {
    incomeInput.value = income;
}

// Save income button
if (saveIncomeBtn) {
    saveIncomeBtn.addEventListener("click", () => {

        const value = parseFloat(incomeInput.value);

        if (!value || value <= 0) {
            alert("Enter a valid income amount.");
            return;
        }

        localStorage.setItem("monthly_income", value);
        updateIncomeBar(value);
    });
}

// Function to update bar
function updateIncomeBar(currentIncome) {

    const remaining = currentIncome - totalSpent;
    const percentUsed = (totalSpent / currentIncome) * 100;

    progressBar.style.width = Math.min(percentUsed, 100) + "%";

    summaryText.textContent =
        `Income: $${currentIncome.toFixed(2)} | Spent: $${totalSpent.toFixed(2)} | Remaining: $${remaining.toFixed(2)} (${percentUsed.toFixed(1)}% used)`;
}


if (income > 0) {
    updateIncomeBar(income);
}

    // Category Chart
    const categoryLabels = data.categories.map(c => c.category);
    const categoryValues = data.categories.map(c => c.total);

    // Pie Chart 
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: categoryLabels,
            datasets: [{
             data: categoryValues,
             backgroundColor: [
                '#6D4C41',
                '#8D6E63',
                '#A1887F',
                '#D7CCC8',
                '#5D4037',
                '#4E342E'
            ],
             borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
            }
        }
    }
});
// bar chart
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: categoryLabels,
            datasets: [{
                label: 'Actual Spending',
                data: categoryValues,
                backgroundColor: '#6D4C41'
            }]
        },
        options: {
            scales: { y: { beginAtZero: true } }
        }
    });

    //Line Chart 
    const monthlyLabels = data.monthly.map(m => m.month);
    const monthlyValues = data.monthly.map(m => m.total);

    new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: 'Total Spent',
                data: monthlyValues,
                borderColor: '#6D4C41',
                fill: false
            }]
        }
    });
}

loadDashboard();
</script>
</body>
</html>
